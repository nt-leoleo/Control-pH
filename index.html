    <!-- Critical CSS inline para LCP -->
    <style>
      /* Critical CSS para First Paint */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

      }
      
      body {
        margin: 0;
        padding: 0;

        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Loading spinner para mejorar perceived performance */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
      }
      
      .app-loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Optimización de fuentes */
      @font-face {
        font-family: 'System';
        font-style: normal;
        font-weight: 300 900;
        font-display: swap;
        src: local('System');
      }
    </style>

  <body>
    <!-- Loading inicial para mejorar perceived performance -->
    <div class="app-loading" id="app-loading">
      <div class="app-loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Script principal con defer para no bloquear rendering -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Script para ocultar loading cuando la app carga -->
    <script>
      window.addEventListener('load', function() {
        const loading = document.getElementById('app-loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s ease-out';
          setTimeout(() => loading.remove(), 300);
        }
      });
    </script>
